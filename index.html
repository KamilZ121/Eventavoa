<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventavoa</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="frontend/css/style.css">
</head>
<body>

<div id="header"></div>

<main class="container my-5">

    <div class="row mb-4">
        <div class="col-md-4">
            <label class="form-label">Kategorie</label>
            <select id="categorySelect" class="form-select">
                <option>Alle Kategorien</option>
            </select>
        </div>

        <div class="col-md-5">
            <label class="form-label">Suche</label>
            <input type="text" id="searchInput" class="form-control" placeholder="Produkt suchen...">
        </div>

        <div class="col-md-3">
            <label class="form-label">Treffer</label>
            <div class="form-control bg-light" id="resultCount">0 Produkte</div>
        </div>
    </div>

    <div class="row" id="productList">
        <div class="col-12">
            <div class="alert alert-secondary">Produkte werden geladen ...</div>
        </div>
    </div>

</main>

<div id="footer"></div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script>
    $("#header").load("frontend/sites/header.html");
    $("#footer").load("frontend/sites/footer.html");
</script>

<script src="frontend/js/main.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
