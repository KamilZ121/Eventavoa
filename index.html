<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventavoa - Eventtechnik Shop</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/eventavoa/frontend/css/style.css">
</head>
<body class="d-flex flex-column" style="min-height: 100vh;">

<div id="header"></div>

<!-- FILTER & SEARCH SECTION -->
<section class="bg-light py-4">
    <div class="container">
        <div class="row g-3">
            <div class="col-md-4">
                <label class="form-label">Kategorie</label>
                <select id="categorySelect" class="form-select">
                    <option value="">Alle Kategorien</option>
                </select>
            </div>

            <div class="col-md-5">
                <label class="form-label">Suche</label>
                <input type="text" id="searchInput" class="form-control" placeholder="Produkt suchen...">
            </div>

            <div class="col-md-3">
                <label class="form-label">Ergebnisse</label>
                <div class="form-control" id="resultCount">0 Produkte</div>
            </div>
        </div>
    </div>
</section>

<main class="container my-5 flex-grow-1" id="products">
    <h2 class="mb-4">Unsere Produkte</h2>
    
    <div id="productList" class="row">
        <div class="col-12">
            <div class="alert alert-info text-center" role="alert">
                <div class="spinner-border spinner-border-sm me-2" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
                Produkte werden geladen...
            </div>
        </div>
    </div>
</main>

<div id="footer"></div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script>
    $(document).ready(function() {
        $("#header").load("/eventavoa/frontend/sites/header.html");
        $("#footer").load("/eventavoa/frontend/sites/footer.html");
    });
</script>

<script src="/eventavoa/frontend/js/main.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
